name: Link KAIROS privacy page
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  link_privacy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link privacy page and write beta static check report
        run: |
          python3 <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          index = Path('index.html')
          s = index.read_text()
          if 'Privacy & Terms' not in s:
              s = s.replace('KAIROS Signal — symbolic timing reading for love, work, wellbeing, and decisions</footer>', 'KAIROS Signal — symbolic timing reading for love, work, wellbeing, and decisions<br><a href="/privacy.html">Privacy & Terms</a></footer>')
              if 'Privacy & Terms' not in s:
                  s = s.replace('</footer>', '<br><a href="/privacy.html">Privacy & Terms</a></footer>')
          index.write_text(s)
          checks = []
          def check(name, ok, note=''):
              checks.append((name, ok, note))
          check('Today’s Timing Almanac exists', 'Today’s Timing Almanac' in s)
          check('Quick Timing Check exists', 'Quick Timing Check' in s)
          check('Full Reading form exists', 'https://formsubmit.co/hello@readkairos.com' in s)
          check('Privacy & Terms page exists', Path('privacy.html').exists())
          check('Privacy link added to homepage', 'Privacy & Terms' in s and '/privacy.html' in s)
          check('Mobile responsive breakpoint exists', '@media(max-width:760px)' in s)
          check('Mobile buttons expand full width', '.btn{width:100%}' in s)
          check('Mobile grid collapses to one column', 'grid-template-columns:1fr' in s)
          check('Work value is unified', 'value="Career"' not in s and 'Career:[' not in s and '},Career:' not in s)
          check('Decision/Luck removed', 'Decision / Luck' not in s)
          check('Boundary language exists', 'KAIROS reads timing, not fate' in s)
          check('Birth details are optional', 'Birth details are optional' in s)
          passed = sum(1 for _, ok, _ in checks if ok)
          lines = ['# KAIROS Beta Static Preflight Report','',f'Generated: {datetime.now(timezone.utc).isoformat()}','',f'Summary: {passed}/{len(checks)} static checks passed.','']
          for name, ok, note in checks:
              lines.append(f'- {"PASS" if ok else "CHECK"}: {name}' + (f' — {note}' if note else ''))
          lines += ['', '## Manual checks still required', '- Submit one real browser test form and confirm the email arrives at hello@readkairos.com.', '- Open the deployed site on iPhone Safari, Android Chrome, and desktop Chrome for visual QA.', '- Confirm the deployed Privacy & Terms link opens at /privacy.html.', '']
          Path('BETA_CHECK_REPORT.md').write_text('\n'.join(lines))
          Path('.github/workflows/link-privacy.yml').unlink(missing_ok=True)
          PY
      - name: Commit privacy link and static report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html BETA_CHECK_REPORT.md .github/workflows/link-privacy.yml
          git diff --cached --quiet || git commit -m "Link privacy page and add beta static checks"
          git push
