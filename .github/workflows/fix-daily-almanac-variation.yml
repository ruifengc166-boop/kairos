name: Fix daily almanac variation
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  fix_daily_variation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Today’s Timing logic
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          s = p.read_text()
          new_category = """function categoryTiming(main,moon,time){let love={signal:'Ask Less',move:'Observe more and keep the message clean.',avoid:'Do not send the paragraph today.'},work={signal:'Prepare',move:'Clarify the ask and gather proof.',avoid:'Do not push from frustration.'},wellbeing={signal:'Restore',move:'Return to rhythm before forcing output.',avoid:'Do not treat depletion as laziness.'},decision={signal:'Ask Clearly',move:'Name the one condition that would make the choice clean.',avoid:'Do not say yes just because the window feels urgent.'};if(main.signal.includes('Adjust')){love={signal:'Repair Softly',move:'Let the visible tension cool, then name one repair.',avoid:'Do not use emotion as evidence.'};work={signal:'Adjust',move:'Repair the shape before pushing forward.',avoid:'Do not escalate from frustration.'};wellbeing={signal:'Regulate',move:'Return the body to rhythm before forcing output.',avoid:'Do not override fatigue.'};decision={signal:'Wait for Cooling',move:'Let intensity pass, then choose the repairable path.',avoid:'Do not decide at the peak of emotion.'}}else if(main.signal.includes('Choose')){love={signal:'Do Not Rush',move:'Let the answer prove itself through steadiness.',avoid:'Do not say yes just to keep the window open.'};work={signal:'Set Terms',move:'Name the condition, boundary, and next step.',avoid:'Do not accept vague pressure.'};decision={signal:'Choose With Care',move:'Separate the real opportunity from the fear of missing it.',avoid:'Do not let urgency vote first.'}}else if(main.signal.includes('Speak')){love={signal:'Ask Clearly',move:'Say one clean thing without testing.',avoid:'Do not turn the message into emotional pressure.'};work={signal:'Name the Ask',move:'Make the request specific and bounded.',avoid:'Do not hint and hope they understand.'}}else if(main.signal.includes('Release')){love={signal:'Release Pressure',move:'Let the loop breathe before reaching again.',avoid:'Do not reopen contact just to soothe anxiety.'};work={signal:'Close Loops',move:'Finish the loose end before starting another.',avoid:'Do not add more work to avoid the old work.'};decision={signal:'Let Go Cleanly',move:'Remove the option that is only surviving through guilt.',avoid:'Do not keep every door half-open.'}}else if(main.signal.includes('Restore')||moon.phase.includes('Waning Crescent')){wellbeing={signal:'Rest',move:'Treat recovery as the useful action.',avoid:'Do not force clarity while depleted.'};work={signal:'Review Quietly',move:'Prepare behind the scenes.',avoid:'Do not confuse low energy with failure.'}}else if(moon.phase.includes('Full')){love={signal:'Cool the Fire',move:'Wait until emotion is lower before speaking.',avoid:'Do not use visibility as pressure.'};decision={signal:'Wait for Cooling',move:'Let the intensity pass before committing.',avoid:'Do not decide at the peak of emotion.'}}if(time.meaning.includes('communication')){love={signal:'Gentle Contact',move:'Ask one clear question and stop there.',avoid:'Do not over-explain.'};work={signal:'Clear Ask',move:'Use simple language and one next step.',avoid:'Do not bury the request.'}}return{Love:love,Work:work,Wellbeing:wellbeing,Decision:decision}}"""
          new_today = """function getTodayAlmanac(date=new Date()){const seed=daySeed(date),time=getTimeLayer(date),moon=getMoonLayer(date),day=date.getDay();let signal=seed.signal,summary=seed.summary,supports=seed.supports.slice(),notSupports=seed.avoid.slice();if(moon.phase.includes('New')||moon.phase.includes('Dark')){const map=[['Release Quietly','The field is inward. Close what is stale before planting again.'],['Begin Quietly','The field is inward. Begin with intention, not announcement.'],['Shape the Seed','The field is inward. Give the idea structure before exposure.'],['Adjust the Seed','The field is inward. Repair the shape before making it visible.'],['Speak Less, Mean More','The field is inward. Keep the message clean and private.'],['Choose the Seed','The field is inward. Choose the condition before choosing the action.'],['Restore the Seed','The field is inward. Recovery is the useful beginning.']][day];signal=map[0];summary=map[1];supports=['Set a clean intention.','Draft before sending.','Reset the plan.','Prepare the seed.'];notSupports=['Forcing confirmation.','Demanding a final answer.','Making public moves too early.','Reading silence as certainty.']}else if(moon.phase.includes('Full')){const full=[{signal:'Release the Heat',summary:'Visibility is high. Close the loop without reopening the fire.',supports:['Let a stale loop close.','Reveal only what is necessary.','Simplify what is already visible.','Return to quiet rhythm.'],avoid:['Reopening old arguments.','Public conflict.','Proving a point.','Deciding at the peak.']},{signal:'Begin Without Heat',summary:'Visibility is high. Start small and do not turn exposure into pressure.',supports:['Take one gentle first step.','Name the intention clearly.','Reveal only the simple version.','Let the reaction settle.'],avoid:['Grand promises.','Performative launches.','Demanding instant confirmation.','Mistaking intensity for readiness.']},{signal:'Cool the Fire',summary:'Visibility is high. Act only after the emotion has cooled.',supports:['Reveal carefully.','Finish what is already visible.','Clarify without pressure.','Witness what is being exposed.'],avoid:['Sending emotional paragraphs.','Public conflict.','Pressure moves.','Deciding at the peak.']},{signal:'Adjust the Fire',summary:'Visibility is high, but the clean move is repair, not reaction.',supports:['Repair one visible pattern.','Clarify without pressure.','Adjust the message before sending.','Witness what is being exposed.'],avoid:['Escalating the visible tension.','Public conflict.','Pressure moves.','Deciding at the peak.']},{signal:'Speak Cleanly Under Fire',summary:'Visibility is high. Say only what can stay clean under pressure.',supports:['Ask one clear question.','Name the boundary.','Send the clean version.','Keep the message short.'],avoid:['Emotional over-explaining.','Indirect pressure.','Testing someone.','Turning clarity into performance.']},{signal:'Choose After Cooling',summary:'Visibility is high. A decision is supported only after the heat drops.',supports:['Set terms.','Review the yes.','Protect your time.','Wait for one confirming signal.'],avoid:['Saying yes too quickly.','Quitting from pressure.','Leaving conditions vague.','Mistaking speed for alignment.']},{signal:'Restore the Field',summary:'Visibility is high, but the body needs rhythm before ambition.',supports:['Rest the body.','Reset the routine.','Prepare privately.','Do less with more care.'],avoid:['Forcing a tired body.','Major decisions from depletion.','Treating exhaustion as laziness.','Overcommitting to feel productive.']}][day];signal=full.signal;summary=full.summary;supports=full.supports.slice();notSupports=full.avoid.slice()}else if(moon.phase.includes('Waning')){signal=seed.signal.includes('Restore')?'Restore and Release':'Release Cleanly';summary='A clearing field. Let the day’s work become lighter instead of louder.';supports=['Let go cleanly.','Edit the plan.','Complete one loop.','Simplify what is heavy.'];notSupports=['Reopening old loops.','Proving a point.','Starting from resentment.','Holding every option open.']}else if(moon.phase.includes('Waxing Gibbous')){signal=seed.signal.includes('Speak')?'Refine the Message':'Prepare First';summary='Growth is present, but refinement should come before exposure.';supports=['Refine the message.','Review details.','Prepare a conversation.','Adjust before showing.'];notSupports=['Launching from impatience.','Overpromising.','Skipping the review.','Confusing progress with readiness.']}if(time.meaning.includes('communication')){supports[0]='Ask one clear question.';notSupports[0]='Emotional over-explaining.'}if(time.meaning.includes('decisions')||time.meaning.includes('structure')){supports[1]='Set terms and boundaries.';notSupports[1]='Saying yes without clarity.'}if(time.meaning.includes('retreat')||time.meaning.includes('inward')){supports[2]='Reflect before acting.';notSupports[2]='Late-night certainty.'}const categories=categoryTiming({signal},moon,time);return{signal,summary,supports,notSupports,time,moon,categories}}"""
          s2, n1 = re.subn(r"function categoryTiming\(main,moon,time\)\{.*?\}function getTodayAlmanac", new_category + "function getTodayAlmanac", s, count=1, flags=re.S)
          if n1 != 1:
              raise SystemExit(f'Failed to patch categoryTiming, replacements={n1}')
          s3, n2 = re.subn(r"function getTodayAlmanac\(date=new Date\(\)\)\{.*?\}let timeLayer,moonLayer", new_today + "let timeLayer,moonLayer", s2, count=1, flags=re.S)
          if n2 != 1:
              raise SystemExit(f'Failed to patch getTodayAlmanac, replacements={n2}')
          p.write_text(s3)
          Path('.github/workflows/fix-daily-almanac-variation.yml').unlink(missing_ok=True)
          PY
      - name: Commit daily variation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-daily-almanac-variation.yml
          git diff --cached --quiet || git commit -m "Vary daily almanac signal across full moon days"
          git push
