<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIROS Signal</title>
<meta name="description" content="Time has a signal. Know when to move, wait, or let go.">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --black: #0a0a0f;
  --dark: #0f0f1a;
  --deep: #141428;
  --navy: #1a1a3a;
  --silver: #c0c0d0;
  --white: #e8e8f0;
  --glow: #7b7bd0;
  --accent: #9090e0;
  --gray: #666680;
}

@font-face {
  font-family: 'System';
  src: local(-apple-system), local(BlinkMacSystemFont), local('Segoe UI'), local(Roboto), local(Helvetica);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--black);
  color: var(--silver);
  overflow-x: hidden;
  line-height: 1.6;
}

.particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.moon-container {
  position: fixed;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  z-index: 1;
  pointer-events: none;
}

.moon {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #e8e8f0, #c0c0d0 40%, #808090 70%, #1a1a3a 100%);
  opacity: 0.08;
  filter: blur(2px);
  box-shadow: 0 0 80px 20px rgba(120, 120, 200, 0.05);
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
}

.nav-logo {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--white);
  font-weight: 300;
}

.nav-logo span {
  color: var(--accent);
}

.nav-links {
  display: flex;
  gap: 24px;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.nav-links a {
  color: var(--gray);
  text-decoration: none;
  transition: color 0.3s;
}

.nav-links a:hover { color: var(--white); }

section {
  position: relative;
  z-index: 2;
  padding: 100px 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 140px;
}

.hero-symbol {
  width: 60px;
  height: 60px;
  margin-bottom: 30px;
  opacity: 0.6;
}

.hero-symbol svg { width: 100%; height: 100%; }

.hero h1 {
  font-size: clamp(28px, 6vw, 60px);
  font-weight: 200;
  letter-spacing: 12px;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 20px;
}

.hero .tagline {
  font-size: clamp(14px, 2vw, 20px);
  font-weight: 300;
  color: var(--silver);
  letter-spacing: 3px;
  max-width: 600px;
  margin-bottom: 50px;
  line-height: 1.8;
}

.cta-btn {
  display: inline-block;
  padding: 14px 40px;
  border: 1px solid var(--accent);
  color: var(--white);
  text-decoration: none;
  letter-spacing: 3px;
  font-size: 12px;
  text-transform: uppercase;
  transition: all 0.4s;
  background: transparent;
}

.cta-btn:hover {
  background: var(--accent);
  color: var(--black);
  box-shadow: 0 0 30px rgba(120,120,200,0.2);
}

.section-header {
  text-align: center;
  margin-bottom: 60px;
}

.section-header h2 {
  font-size: 28px;
  font-weight: 200;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 12px;
}

.section-header p {
  color: var(--gray);
  font-size: 14px;
  letter-spacing: 2px;
}

.signals-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  max-width: 900px;
  margin: 0 auto;
}

.signal-card {
  background: linear-gradient(135deg, rgba(20,20,40,0.6), rgba(10,10,15,0.8));
  border: 1px solid rgba(120,120,200,0.1);
  padding: 40px 30px;
  text-align: center;
  transition: all 0.3s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.signal-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(120,120,200,0.05));
  opacity: 0;
  transition: opacity 0.3s;
}

.signal-card:hover::before { opacity: 1; }
.signal-card:hover { border-color: rgba(120,120,200,0.3); transform: translateY(-2px); }

.signal-icon { width: 32px; height: 32px; margin: 0 auto 16px; opacity: 0.4; }
.signal-card h3 {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 10px;
}
.signal-card p { font-size: 13px; color: var(--gray); line-height: 1.7; }

.today-signal {
  max-width: 700px;
  margin: 80px auto 0;
  text-align: center;
  padding: 50px 30px;
  border: 1px solid rgba(120,120,200,0.15);
  background: linear-gradient(135deg, rgba(20,20,40,0.4), rgba(10,10,15,0.6));
}

.today-label {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}

.today-signal blockquote {
  font-size: 20px;
  font-weight: 300;
  color: var(--white);
  letter-spacing: 2px;
  line-height: 1.8;
  font-style: italic;
}

.today-meta {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 24px;
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 2px;
}

.today-meta > div span { color: var(--accent); }

.signal-form {
  max-width: 640px;
  margin: 0 auto;
  display: grid;
  grid-gap: 24px;
  padding: 0 20px;
}

.form-row {
  display: grid;
  grid-gap: 8px;
}

.form-row label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray);
}

.form-row select,
.form-row input,
.form-row textarea {
  width: 100%;
  padding: 12px 16px;
  background: rgba(20,20,40,0.6);
  border: 1px solid rgba(120,120,200,0.2);
  color: var(--white);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}

.form-row select:hover,
.form-row input:hover,
.form-row textarea:hover {
  border-color: rgba(120,120,200,0.4);
}

.form-row select:focus,
.form-row input:focus,
.form-row textarea:focus {
  border-color: var(--accent);
}

.form-row textarea {
  min-height: 80px;
  resize: vertical;
}

.form-row select {
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none%23x101%3B%23x0A%23x20%23x20c90c0e0'%23xA%3C%2Fpath%23xBE%23xA5%23xA5%3E%23A0%3C%2Fsvg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 36px;
}

.consent {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 12px;
  color: var(--gray);
  line-height: 1.5;
  cursor: pointer;
}

.consent input {
  margin-top: 3px;
}

.email-section {
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}

.email-form {
  display: flex;
  gap: 0;
  max-width: 480px;
  margin: 30px auto 0;
}
